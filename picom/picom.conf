# Animations
transition-length = 300
transition-pow-x = 0.5
transition-pow-y = 0.5
transition-pow-w = 0.5
transition-pow-h = 0.5
size-transition = true

# Corners
corner-radius = 12.0;
rounded-cornders-exclude = [
	"class_g = 'example_app'"
];
round-borders = 1;

# Shadows
# (does not work with rounded corners)
shadow = false;
shadow-radius = 20;
shadow-opacity = 0.6;
shadow-offset-x = -20;
shadow-offset-y = -5;
shadow-ignore-shaped = false;
shadow-exclude = [
    "class_g = 'polybar'",
    "window_type = 'dock'"
]

# Fading
fading = true;
fade-delta = 3;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Transparency / Opacity
inactive-opacity = 0.8;
active-opacity = 0.9;
frame-opacity = 1;
opacity-rule = [
	"100:class_g = 'firefox'",
	"100:class_g = 'Blender'",
	"100:class_g = 'dmenu'",
	"100:class_g = 'Microsoft Teams - Preview'",
	"100:class_g = 'code-oss'",
	"100:class_g = 'Alacritty'",
	"100:class_g = 'zoom'",
  "100:class_g = 'Spotify'",
];

# Background Blurring
blur-method = "kawase";
blur-size = 12;
blur-deviation = false;
blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;
blur-kern = "3x3box";
blur-background-exclude = [
	"class_g = 'example_app'"
];

# General Settings
experimental-backends = true;
backend = "glx";
vsync = true;
use-damage = false;
log-level = "debug";
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
refresh-rate = 0; # detect with X RandR extension

